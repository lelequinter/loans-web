# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build app inside Docker
        run: |
          docker build --target build -t loans-web-build .
          docker create --name temp loans-web-build
          rm -rf dist
          mkdir -p dist
          docker cp temp:/app/dist/loans-web ./dist
          docker rm temp

      - name: Install dependencies for Firebase
        run: npm ci

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOANS_WEB }}
          channelId: live
          projectId: loans-web
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
